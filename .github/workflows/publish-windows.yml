name: Build Windows release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload
        required: true
        default: v0.3.0

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci
          python -m pip install -r requirements-build.txt

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $expectedTag = "v$packageVersion"
          if ($env:RELEASE_TAG -ne $expectedTag) {
            throw "Release tag $env:RELEASE_TAG does not match package version $expectedTag"
          }

      - name: Build Windows installer
        shell: pwsh
        run: npm run dist

      - name: Create GitHub Release if missing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:RELEASE_TAG" --repo "$env:GITHUB_REPOSITORY"
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" --generate-notes --repo "$env:GITHUB_REPOSITORY"
            if ($LASTEXITCODE -ne 0) {
              throw "Unable to create release $env:RELEASE_TAG"
            }
          }

      - name: Upload installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem -Path release -Filter 'SSO-Bridge-Setup-*.exe' | Select-Object -First 1
          $blockmap = Get-ChildItem -Path release -Filter 'SSO-Bridge-Setup-*.exe.blockmap' | Select-Object -First 1
          if (-not $installer -or -not $blockmap) {
            throw 'The Windows installer or blockmap was not generated'
          }
          gh release upload "$env:RELEASE_TAG" `
            $installer.FullName `
            $blockmap.FullName `
            "release/latest.yml" `
            --clobber `
            --repo "${{ github.repository }}"
